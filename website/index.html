document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    if (e && e.target && e.target.tagName === 'IMG') return;
    if (e && e.filename && e.filename.indexOf(window.location.origin) !== 0) return;
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

!wa.value.trim()){ this.nudge(wa); bad = true; }\n    if(!tw || !tw.value.trim()){ this.nudge(tw); bad = true; }\n    if(bad) return;\n    this.setState({ sending:true });\n    const body = new URLSearchParams(new FormData(form));\n    try{\n      await fetch(\"https://script.google.com/macros/s/AKfycbwE18NpoEIWOPKnm3xuTl-YA1fcWk2N_kqoXb9oeD5ygrboXkJORpFjDSnUhaFz0A7lhg/exec\", { method:\"POST\", mode:\"no-cors\", body });\n    }catch(err){ /* opaque no-cors: resolved or errored, treat as delivered */ }\n    this.setState({ sending:false, submitted:true });\n  };\n\n  componentDidMount(){\n    this.startCountdown();\n    this.spawnHearts();\n  }\n  componentWillUnmount(){ clearInterval(this._t); }\n\n  startCountdown(){\n    const raw = this.props.countdownDate || '2026-08-15T17:00:00Z';\n    let target = new Date(raw).getTime();\n    if (isNaN(target)) target = new Date('2026-08-15T17:00:00Z').getTime();\n    const tick = () => {\n      const d = Math.max(0, target - Date.now());\n      const p = n => String(n).padStart(2,'0');\n      this.setState({\n        days: p(Math.floor(d/86400000)),\n        hrs:  p(Math.floor(d%86400000/3600000)),\n        min:  p(Math.floor(d%3600000/60000)),\n        sec:  p(Math.floor(d%60000/1000)),\n      });\n    };\n    tick();\n    this._t = setInterval(tick, 1000);\n  }\n\n  spawnHearts(){\n    if (this.props.showHearts === false) return;\n    const c = this.heartsRef.current;\n    if (!c) return;\n    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n    const emojis = ['💖','💕','✨','🌸','🩷','🎀','⭐','💗'];\n    for (let i=0;i<24;i++){\n      const s = document.createElement('span');\n      s.textContent = emojis[Math.floor(Math.random()*emojis.length)];\n      const size = 12 + Math.random()*22;\n      s.style.cssText = `position:absolute;left:${Math.random()*100}%;bottom:-40px;font-size:${size}px;opacity:${(.35+Math.random()*.5).toFixed(2)};animation:floatUp ${(6+Math.random()*8).toFix     function setHint(t){if(hint)hint.textContent=t;}
    function visible(){var o=[];document.querySelectorAll('[data-reveal]').forEach(function(x){o.push(x.dataset.cur);});return o;}
    function sfxRare(){[440,554,659,880,1108].forEach(function(f,i){setTimeout(function(){tone(f,f*1.01,0.28,'square',0.22);tone(f*2,f*2.02,0.3,'sine',0.12);},i*95);});}
    document.querySelectorAll('[data-reveal]').forEach(function(t){
      var img=t.querySelector('img');
      t.dataset.cur=img.getAttribute('src');
      t.dataset.baseAnim=t.style.animation;
      img.style.transition='transform .19s ease-in';
      function clearRare(){t.style.animation=t.dataset.baseAnim;t.style.boxShadow='';}
      t.addEventListener('click',function(){
        if(t.dataset.busy)return;t.dataset.busy='1';
        var vis=visible(),pick;
        var visH={};document.querySelectorAll('[data-reveal]').forEach(function(x){
          if(x!==t&&x.dataset.cur!==BACK&&HOOD[x.dataset.cur])visH[HOOD[x.dataset.cur]]=1;});
        var rareOnScreen=vis.filter(function(s){return RARES.indexOf(s)!==-1&&s!==t.dataset.cur;}).length;
        var pool=bank.filter(function(s){
          return vis.indexOf(s)===-1&&!visH[HOOD[s]]&&!(rareOnScreen>=2&&RARES.indexOf(s)!==-1);});
        if(!pool.length)pool=bank.filter(function(s){return vis.indexOf(s)===-1;});
        pick=pool[Math.floor(Math.random()*pool.length)];
        var isRare=RARES.indexOf(pick)!==-1;
        var pre=new Image();pre.src=pick;
        var r=t.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
        function flipTo(src,done){
          if(src===BACK)clearRare();
          img.style.transform='rotateY(88deg)';
          setTimeout(function(){
            function go(){
              img.src=src;t.dataset.cur=src;
              img.style.transition='transform .22s ease-out';
              img.style.transform='rotateY(0deg)';
              setTimeout(function(){img.style.transition='transform .19s ease-in';done&&done();},240);
            }
            if(src!==BACK&&!pre.complete){pre.onload=go;setTimeout(go,1500);}else{go();}
          },200);
        }
        function finish(){
          reveals++;
          if(isRare){
            t.style.animation=t.dataset.baseAnim+', uwuLegGlow 1.6s ease-out';
            var sh=document.createElement('div');sh.className='uwu-shine';t.appendChild(sh);
            setTimeout(function(){sh.remove();},1150);
            setTimeout(function(){
              if(RARES.indexOf(t.dataset.cur)!==-1){
                t.style.animation=t.dataset.baseAnim+', uwuRarePulse 2.4s ease-in-out infinite';
              }
            },1650);
            sfxRare();
            burst(cx,cy,true,'gold');
            setTimeout(function(){burst(cx,cy,false,'gold');},180);
            setHint('👑 RARE FOUND!! she is one of the rarest gfs ✨');
          }else{
            clearRare();
            sfx('sparkle');burst(cx,cy,true,'hero');
            setHint(reveals<2?'cutie!! tap again for the next gf 💕':'keep tapping — a RARE one is hiding in there 👑');
          }
          t.dataset.busy='';
        }
        if(t.dataset.cur!==BACK){sfx('tick');flipTo(BACK,function(){setTimeout(function(){flipTo(pick,finish);},300);});}
        else{flipTo(pick,finish);}
      });
    });
    document.addEventListener('click',function(e){
      if(e.target.closest('#uwu-sound-btn'))return;
      if(e.target.closest('[data-reveal]'))return;
      var el=e.target, z=zone(el);
      var cta=el.closest('a[href="#whitelist"],button[type="submit"]');
      var interactive=el.closest('a,button,summary,[role="button"],input,textarea,select,label');
      var img=el.closest('img');
      if(cta){sfx('wow');burst(e.clientX,e.clientY,true,'form');}
      else if(z==='ok'&&img){sfx('chime');burst(e.clientX,e.clientY,false,'ok');}
      else if(z==='bad'&&img){sfx('womp');burst(e.clientX,e.clientY,false,'bad');}
      else if(z==='wardrobe'&&img){sfx('boing');burst(e.clientX,e.clientY,false,'wardrobe');}
      else if(z==='faq'&&interactive){sfx('flip');burst(e.clientX,e.clientY,false,'faq');}
      else if(z==='form'&&interactive){sfx('key');burst(e.clientX,e.clientY,false,'form');}
      else if(img){sfx('boing');burst(e.clientX,e.clientY,false,z);}
      else if(interactive){sfx('pop');burst(e.clientX,e.clientY,false,z);}
      else{sfx('tick');burst(e.clientX,e.clientY,false,z);}
    },true);
  }
})();
</script>
